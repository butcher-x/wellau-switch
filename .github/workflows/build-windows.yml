name: Build Windows (Wellau Router)

# 在 Windows runner 上编译 Wellau Router 桌面端（仅供内部测试快速出包）。
# - 仅手动触发：Actions 页面 "Run workflow"
# - 正式发版（带自动更新）请用 release.yml（打 v 开头的 tag 触发）。
#
# 说明：
# - 仓库根需同时包含 cc-switch/ 与 wellau/（@wellau/* 解析到 ../wellau）。
# - 用 --config 叠加 wellau 覆盖配置；并关闭 createUpdaterArtifacts，
#   这样无需 Tauri 更新器签名密钥即可出包（仅用于内部测试包，不含自动更新）。
# - 产物：NSIS 安装器(.exe)。

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: cc-switch
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: cc-switch/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: cc-switch/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Wellau Router (Windows)
        shell: bash
        env:
          CC_SWITCH_APP_CONFIG_DIR_NAME: .wellau-switch
        # 仅产出 NSIS 安装器(.exe)：基础配置的自定义 WiX(per-user-main.wxs)在改名后
        # light.exe 打包失败；NSIS 安装包已足够用于安装测试。
        run: |
          pnpm exec tauri build --bundles nsis \
            --config ../wellau/tauri/tauri.wellau.conf.json \
            --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: wellau-router-windows
          path: |
            cc-switch/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
