name: Release (Wellau Router)

# 发布带自动更新能力的 Wellau Router 桌面端。
#
# 触发方式：
# - 推送 v 开头的 tag（推荐）：例如 git tag v3.16.3 && git push origin v3.16.3
# - 手动触发：Actions 页面 "Run workflow" 并填入 tag（例如 v3.16.3）
#
# 产物：每个平台的安装包 + Tauri 更新签名(.sig)，并由 tauri-action 生成/合并
# latest.json，统一发布到同一个 GitHub Release。客户端 updater endpoint 指向
# releases/latest/download/latest.json，即可检查到新版并一键更新。
#
# 前置：仓库需配置 Secrets：
# - TAURI_SIGNING_PRIVATE_KEY           更新私钥内容
# - TAURI_SIGNING_PRIVATE_KEY_PASSWORD  私钥密码
#
# 注意：latest.json 中的版本号取自 cc-switch/src-tauri/tauri.conf.json 的 version，
# 发版前请先 bump 该版本号（必须高于已安装版本，否则客户端不会提示更新）。

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v3.16.3)"
        required: true
      target:
        description: "Release target"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - windows
          - mac-apple-silicon
          - mac-intel
          - linux

permissions:
  contents: write

jobs:
  release-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Select release targets
        id: matrix
        shell: bash
        run: |
          target="${{ github.event.inputs.target || 'all' }}"

          case "$target" in
            all)
              cat >> "$GITHUB_OUTPUT" <<'JSON'
          matrix={"include":[{"platform":"windows-latest","target":"windows","args":"--bundles nsis --config ../wellau/tauri/tauri.wellau.conf.json"},{"platform":"macos-latest","target":"mac-apple-silicon","args":"--bundles app,dmg --config ../wellau/tauri/tauri.wellau.conf.json"},{"platform":"ubuntu-22.04","target":"linux","args":"--bundles appimage,deb,rpm --config ../wellau/tauri/tauri.wellau.conf.json"},{"platform":"macos-15-intel","target":"mac-intel","args":"--bundles app,dmg --config ../wellau/tauri/tauri.wellau.conf.json"}]}
          JSON
              ;;
            windows)
              cat >> "$GITHUB_OUTPUT" <<'JSON'
          matrix={"include":[{"platform":"windows-latest","target":"windows","args":"--bundles nsis --config ../wellau/tauri/tauri.wellau.conf.json"}]}
          JSON
              ;;
            mac-apple-silicon)
              cat >> "$GITHUB_OUTPUT" <<'JSON'
          matrix={"include":[{"platform":"macos-latest","target":"mac-apple-silicon","args":"--bundles app,dmg --config ../wellau/tauri/tauri.wellau.conf.json"}]}
          JSON
              ;;
            mac-intel)
              cat >> "$GITHUB_OUTPUT" <<'JSON'
          matrix={"include":[{"platform":"macos-15-intel","target":"mac-intel","args":"--bundles app,dmg --config ../wellau/tauri/tauri.wellau.conf.json"}]}
          JSON
              ;;
            linux)
              cat >> "$GITHUB_OUTPUT" <<'JSON'
          matrix={"include":[{"platform":"ubuntu-22.04","target":"linux","args":"--bundles appimage,deb,rpm --config ../wellau/tauri/tauri.wellau.conf.json"}]}
          JSON
              ;;
            *)
              echo "Unknown release target: $target" >&2
              exit 1
              ;;
          esac

  release:
    needs: release-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.release-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: cc-switch/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: cc-switch/src-tauri -> target

      - name: Install dependencies
        working-directory: cc-switch
        run: pnpm install --frozen-lockfile

      - name: Build & publish (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CC_SWITCH_APP_CONFIG_DIR_NAME: .wellau-switch
        with:
          projectPath: cc-switch
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Wellau Router ${{ github.event.inputs.tag || github.ref_name }}"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
